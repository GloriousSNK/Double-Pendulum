dataset:
  systems: [1, 2, 3]
  trajectories_per_cell: 20
  ground_truth_dt: 0.001
  total_seconds: 65
  pre_context_seconds: 10.0
  seed: 42

regimes:
  normal:
    g: 9.81
    L: [1.0]
    m: [1.0]
    damping: 0.0
  changed_disclosed:
    g: 3.71
    L: [1.4, 0.7, 1.1]
    m: [2.0, 0.6, 1.5]
    damping: 0.05
  changed_hidden:
    g: 1.62
    L: [0.8, 1.2, 0.9]
    m: [0.5, 1.8, 1.0]
    damping: 0.1

initial_conditions:
  theta_low: -3.0
  theta_high: 3.0
  omega_low: -1.0
  omega_high: 1.0

horizons_seconds: [0.01, 1.0, 10.0, 60.0]

modalities: [coords, images, images_coords]

prompting: [no_cot, cot]

rendering:
  image_size: [512, 512]
  fps: 30
  background: "#0a0a0a"
  grid: true
  show_trail: false

azure:
  api_version: "2024-08-01-preview"
  request_timeout: 120
  max_retries: 4

models:
  - name: gpt-5.5
    kind: llm
    deployment: gpt-5.5
    vision: true
    concurrency: 6
  - name: kimi-k2.6
    kind: llm
    deployment: kimi-k2.6
    vision: false
    concurrency: 6
  - name: deepseek-v4
    kind: llm
    deployment: deepseek-v4
    vision: false
    concurrency: 6
  - name: qwen
    kind: llm
    deployment: qwen-max
    vision: true
    concurrency: 6
  - name: grok-4-fast-reasoning
    kind: llm
    deployment: grok-4-fast-reasoning
    vision: true
    concurrency: 6

  - name: euler
    kind: numerical
    method: euler
    step: 0.01
  - name: rk4
    kind: numerical
    method: rk4
    step: 0.01
  - name: symplectic
    kind: numerical
    method: leapfrog
    step: 0.01

  - name: chronos
    kind: timeseries
    variant: chronos
    max_prediction_length: 256
    concurrency: 4
  - name: timesfm
    kind: timeseries
    variant: timesfm
    max_prediction_length: 256
    concurrency: 4
  - name: moirai
    kind: timeseries
    variant: moirai
    max_prediction_length: 256
    concurrency: 4

paths:
  results_dir: results
  checkpoints_dir: results/checkpoints
  raw_dir: results/raw
  summary_dir: results/summary
  dataset_dir: results/dataset
  renders_dir: results/renders

metrics:
  divergence_threshold_rad: 0.5
  divergence_threshold_xy: 0.5
